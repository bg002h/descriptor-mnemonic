name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Clone patched miniscript fork (md-codec-local-stack)
        shell: bash
        run: |
          git clone --depth 50 --branch md-codec-local-stack https://github.com/bg002h/rust-miniscript ../rust-miniscript-fork
          cd ../rust-miniscript-fork
          git checkout b308afd
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone patched miniscript fork (md-codec-local-stack)
        run: |
          git clone --depth 50 --branch md-codec-local-stack https://github.com/bg002h/rust-miniscript ../rust-miniscript-fork
          cd ../rust-miniscript-fork
          git checkout b308afd
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: conformance-vector checksum pin
        run: cd design && sha256sum -c display-grouping-vectors.tsv.sha256
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  doc:
    name: cargo doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - name: Clone patched miniscript fork (md-codec-local-stack)
        run: |
          git clone --depth 50 --branch md-codec-local-stack https://github.com/bg002h/rust-miniscript ../rust-miniscript-fork
          cd ../rust-miniscript-fork
          git checkout b308afd
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --document-private-items

  freebsd-compile-gate:
    # Cycle C — FreeBSD compile-gate. Catches the day a Linux-only syscall /
    # cfg / crate breaks the `cargo install`-on-FreeBSD path, and compile-covers
    # the BSD secret-hygiene arm in `src/process_hardening.rs`
    # (procctl/setrlimit). `x86_64-unknown-freebsd` is Tier 2 with Host Tools,
    # so `rustup target add` ships a precompiled std on the ubuntu runner; no
    # apt cross-compiler step is needed (cargo check stops before link; the only
    # C step is the vendored libsecp256k1 cc compile, which builds against the
    # Tier-2 std — validated locally with bare rustup). Fallback if that ever
    # needs a freebsd sysroot: switch to `cross check --target …` (cross-rs
    # bundles a freebsd container).
    #
    # CRITICAL — this MUST be a WHOLE-CRATE check (`cargo check --target …`),
    # NEVER `--lib`. md-cli is a BIN-ONLY crate (no `src/lib.rs`); its
    # `process_hardening` lives only in the bin target (`mod process_hardening;`
    # in `main.rs`). A `cargo check --lib` would compile nothing relevant and
    # give silent false-green coverage of the entire BSD hardening arm. Only the
    # bare whole-crate check reaches `main.rs` and therefore the hardening
    # module. (The toolkit's `--lib` row is a special case that works only
    # because the toolkit alone declares `process_hardening` as `pub mod` in
    # `src/lib.rs`.)
    name: freebsd compile-gate (whole-crate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: x86_64-unknown-freebsd
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --target x86_64-unknown-freebsd -p md-cli

  musl-check:
    # musl target coverage (static air-gapped binary cycle). Both musl targets
    # are Tier 2 with Host Tools and `unix` + Linux, so every `#[cfg(unix)]` /
    # `#[cfg(target_os = "linux")]` path compiles + is functional on musl with
    # ZERO source change.
    #
    # FORK-FREE SCOPE — this job is scoped `-p md-cli` and does NOT clone the
    # `md-codec-local-stack` patched-miniscript fork the `--workspace` test job
    # needs. `-p md-cli` resolves the registry miniscript 13.0.0 and is the same
    # scope `man-pages.yml` already builds successfully without the fork. Do NOT
    # run a `--workspace` musl test here without replicating the ci.yml
    # fork-clone step.
    #
    #   * x86_64-musl — built + tested natively. Needs `musl-tools` (`musl-gcc`)
    #     + `CC_x86_64_unknown_linux_musl=musl-gcc` so cc-rs builds the ONLY C
    #     dep (the vendored libsecp256k1 in `secp256k1-sys`) against musl.
    #   * aarch64-musl — `cross test` under QEMU user-mode emulation (cross
    #     bundles the musl cross C toolchain AND the qemu-aarch64 runner). This
    #     RUNS the package test suite on aarch64-Linux so the md1/descriptor/
    #     address golden vectors are output-verified for the shipped aarch64
    #     binary, not merely compiled. Stays `-p md-cli` (the FORK-FREE SCOPE
    #     above) — same registry-miniscript resolution as the native leg, which
    #     already passes fork-free; QEMU only changes the RUN target, not the
    #     dependency set. No `--skip` needed: md-cli has NO `mlock` module
    #     (only `process_hardening`, whose sole Linux test exercises
    #     `prctl(PR_SET_DUMPABLE)`, which qemu-user forwards to the host).
    #
    # crt-static left at its musl default (ON). NEVER pass
    # `-Ctarget-feature=-crt-static` (rust#135244 silently links host glibc).
    # Toolchain pinned `@1.85.0` (matches `rust-toolchain.toml`).
    name: musl compile/test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            musl_native: true
          - target: aarch64-unknown-linux-musl
            cross: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: install musl-tools (x86_64-musl native)
        if: ${{ matrix.musl_native }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: install cross (aarch64-musl)
        if: ${{ matrix.cross }}
        run: cargo install --locked cross
      - name: cargo test -p md-cli --target x86_64-musl (native, fork-free)
        if: ${{ matrix.musl_native }}
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: cargo test -p md-cli --target ${{ matrix.target }}
      # Run the package test suite on aarch64-Linux under QEMU user-mode so the
      # md1/descriptor/address golden vectors are OUTPUT-verified for the
      # shipped aarch64 binary. Stays `-p md-cli` (fork-free scope, per the job
      # header). No `--skip` needed (no `mlock` module).
      - name: cross test -p md-cli --target aarch64-musl (QEMU; output goldens, fork-free)
        if: ${{ matrix.cross }}
        run: cross test --release -p md-cli --target ${{ matrix.target }}
